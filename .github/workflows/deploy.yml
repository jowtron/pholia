name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CLAUDE.md'
      - 'README.md'
      - '*.go'
      - 'go.mod'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Inject build version
        run: sed -i "s/>dev</>$(git rev-parse --short HEAD)</" index.html

      - name: Deploy to Cloudflare Pages (retry with backoff)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: "false"
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt..."
            if npx wrangler pages deploy . --project-name=cadence --commit-dirty=true --commit-hash="${GITHUB_SHA}" --commit-message="${FIRST_LINE}"; then
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "Deploy failed, retrying in 30s..."
              sleep 30
            fi
          done
          echo "Deploy failed after 3 attempts"
          exit 1
